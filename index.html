<!DOCTYPE html>
<html lang="es-CL" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MyGin — Gin premium chileno. Crafted en Villarrica.">
  <title>MyGin — El gin que se vive.</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="font-body bg-background text-on-surface selection:bg-primary/30 selection:text-primary">

  <!-- ─── NAVBAR ────────────────────────────────────────────────── -->
  <nav class="fixed top-0 w-full z-50 flex justify-between items-center px-8 md:px-12 py-5 backdrop-blur-md transition-all duration-300" id="navbar" role="navigation" aria-label="Navegación principal">

    <a href="#" aria-label="MyGin — Inicio" data-slot="nav-logo" class="text-2xl font-headline font-bold text-on-surface"></a>

    <!-- Links desktop -->
    <div class="hidden md:flex gap-10" data-slot="nav-links"></div>

    <!-- CTA desktop -->
    <div class="hidden md:flex items-center gap-6" data-slot="nav-cta"></div>

    <!-- Toggle mobile -->
    <button
      class="md:hidden flex flex-col gap-1.5 p-2"
      aria-label="Abrir menú"
      aria-expanded="false"
      aria-controls="mobile-menu"
      id="mobile-toggle"
    >
      <span class="block w-6 h-px bg-on-surface transition-all"></span>
      <span class="block w-6 h-px bg-on-surface transition-all"></span>
      <span class="block w-6 h-px bg-on-surface transition-all"></span>
    </button>
  </nav>

  <!-- Menú mobile -->
  <div
    class="fixed top-0 left-0 w-full h-screen bg-surface-container-lowest z-40 flex flex-col justify-center items-center gap-8 translate-x-full transition-transform duration-300"
    id="mobile-menu"
    role="menu"
    data-slot="nav-mobile-links"
  ></div>


  <main>

    <!-- ─── HERO ──────────────────────────────────────────────────── -->
    <section class="relative min-h-screen flex items-center overflow-hidden pt-20" aria-labelledby="hero-headline">

      <!-- Imagen de fondo -->
      <div class="absolute inset-0 z-0 ml-[700px]">
        <div class="absolute inset-0 bg-gradient-to-r from-background via-background/80 to-transparent z-10"></div>
        <img
          data-hero="bg"
          src=""
          alt=""
          aria-hidden="true"
          loading="eager"
          class="w-full h-full object-cover grayscale opacity-40"
        >
      </div>

      <!-- Contenido -->
      <div class="container mx-auto px-8 md:px-12 relative z-20">
        <div class="max-w-4xl">
          <span class="text-secondary font-label uppercase tracking-[0.4em] text-xs mb-6 block" data-hero="label"></span>
          <h1 class="font-headline text-6xl md:text-8xl leading-tight mb-8 tracking-tighter reveal" id="hero-headline" data-hero="headline"></h1>
          <p class="text-on-surface-variant text-lg max-w-md mb-12 reveal reveal--delay-1" data-hero="subheadline"></p>
          <div class="flex flex-wrap gap-6 reveal reveal--delay-2" data-hero="ctas"></div>
        </div>
      </div>

      <!-- Origen — desktop -->
      <div class="absolute bottom-12 right-12 z-20 hidden lg:flex flex-col items-end gap-1">
        <span class="text-[0.6rem] uppercase tracking-widest text-on-surface-variant">Destilado en</span>
        <span class="font-headline text-xl">Villarrica, Chile</span>
      </div>
    </section>


    <!-- ─── PRODUCTO ──────────────────────────────────────────────── -->
    <section class="py-32 bg-surface" id="producto" aria-labelledby="producto-headline">
      <div class="container mx-auto px-8 md:px-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-24 items-center">

          <!-- Imagen con glow hover -->
          <div class="relative group">
            <div class="absolute -inset-4 bg-surface-container-low rounded-xl blur-2xl group-hover:bg-surface-container-high transition-all duration-700"></div>
            <img
              data-producto="image"
              src=""
              alt=""
              loading="lazy"
              class="relative z-10 w-full max-w-md mx-auto transform group-hover:scale-105 transition-transform duration-700 reveal"
            >
          </div>

          <!-- Copy + beneficios -->
          <div>
            <span class="text-secondary font-label uppercase tracking-[0.4em] text-xs mb-4 block" data-producto="label"></span>
            <h2 class="font-headline text-4xl mb-12 tracking-tighter reveal" id="producto-headline" data-producto="headline"></h2>
            <p class="text-on-surface-variant text-sm leading-relaxed mb-12 reveal reveal--delay-1" data-producto="body"></p>
            <!-- Beneficios (generados por render.js) -->
            <ul class="space-y-10" data-producto="benefits"></ul>
          </div>

        </div>
      </div>
    </section>


    <!-- ─── EXPERIENCIA (Bento Grid) ─────────────────────────────── -->
    <section class="py-32 bg-surface-container-lowest" id="experiencia" aria-labelledby="experiencia-headline">
      <div class="container mx-auto px-8 md:px-12 text-center mb-20">
        <span class="text-secondary font-label uppercase tracking-[0.4em] text-xs mb-4 block" data-experiencia="label"></span>
        <h2 class="font-headline text-5xl tracking-tighter reveal" id="experiencia-headline" data-experiencia="headline"></h2>
      </div>
      <!-- Bento grid (generado por render.js) -->
      <div class="container mx-auto px-8 md:px-12" data-experiencia="moments"></div>
    </section>


    <!-- ─── TESTIMONIOS ───────────────────────────────────────────── -->
    <section class="py-32 bg-surface overflow-hidden" id="testimonios" aria-labelledby="testimonios-headline">
      <div class="container mx-auto px-8 md:px-12">
        <h2 class="font-headline text-3xl mb-16 text-center tracking-tighter reveal" id="testimonios-headline" data-testimonios="headline"></h2>
        <!-- Cards (generadas por render.js) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" data-testimonios="items"></div>
      </div>
    </section>


    <!-- ─── PRECIOS ───────────────────────────────────────────────── -->
    <section class="py-32 bg-surface-container-lowest" id="precios" aria-labelledby="precios-headline">
      <div class="container mx-auto px-8 md:px-12 max-w-5xl">
        <div class="text-center mb-20">
          <span class="text-secondary font-label uppercase tracking-[0.4em] text-xs mb-4 block" data-precios="label"></span>
          <h2 class="font-headline text-4xl tracking-tighter reveal" id="precios-headline" data-precios="headline"></h2>
        </div>
        <!-- Price cards (generadas por render.js) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12" data-precios="tiers"></div>
      </div>
    </section>


    <!-- ─── URGENCY BANNER ────────────────────────────────────────── -->
    <section class="bg-primary py-16" aria-labelledby="urgencia-headline" data-slot="urgency-banner"></section>


  </main>


  <!-- ─── FOOTER ────────────────────────────────────────────────── -->
  <footer class="w-full bg-surface-container-lowest flex flex-col md:flex-row justify-between items-center px-8 md:px-12 py-12 gap-8" role="contentinfo">

    <div data-slot="footer-logo" class="text-lg font-headline text-on-surface"></div>

    <nav aria-label="Links de pie de página">
      <div class="flex flex-wrap justify-center gap-8" data-slot="footer-links"></div>
    </nav>

    <div class="flex flex-col items-center md:items-end gap-2 text-center md:text-right">
      <a class="text-secondary hover:text-primary transition-colors text-xs tracking-widest uppercase" data-footer="instagram" href="#" target="_blank" rel="noopener noreferrer"></a>
      <p class="text-on-surface-variant text-[0.6rem] tracking-[0.2em] uppercase" data-footer="copy"></p>
      <p class="text-on-surface-variant text-[0.6rem] tracking-[0.2em] uppercase" data-footer="note"></p>
    </div>

  </footer>


  <!-- ─── Scripts ───────────────────────────────────────────────── -->
  <script type="module">
    import { renderAll }      from './js/render.js';
    import { initNav }        from './js/nav.js';
    import { initAnimations } from './js/animations.js';

    renderAll();
    initNav();
    initAnimations();
  </script>

</body>
</html>
